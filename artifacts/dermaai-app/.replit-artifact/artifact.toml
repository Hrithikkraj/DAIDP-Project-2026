kind = "web"
previewPath = "/"
title = "DermaAI App"
version = "1.0.0"
id = "artifacts/dermaai-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19393

[services.development]
run = "pnpm --filter @workspace/dermaai-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dermaai-app", "run", "build" ]
publicDir = "artifacts/dermaai-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19393"
BASE_PATH = "/"
