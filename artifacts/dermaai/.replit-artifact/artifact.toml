kind = "web"
previewPath = "/"
title = "DermaAI - Skin Analysis App"
version = "1.0.0"
id = "artifacts/dermaai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24690

[services.development]
run = "pnpm --filter @workspace/dermaai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dermaai", "run", "build" ]
publicDir = "artifacts/dermaai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24690"
BASE_PATH = "/"
