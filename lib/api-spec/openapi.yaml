openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: DermaAI - AI-powered skin analysis API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: scans
    description: Skin scan and analysis operations
  - name: history
    description: Scan history operations
  - name: routine
    description: Skincare routine operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Create a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupBody"
      responses:
        "201":
          description: Account created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid input or email already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in to an existing account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analyze:
    post:
      operationId: analyzeSkin
      tags: [scans]
      summary: Upload a skin photo for AI analysis
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
              required: [image]
      responses:
        "200":
          description: Analysis complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResult"
        "400":
          description: Missing or invalid image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /history:
    get:
      operationId: getScanHistory
      tags: [history]
      summary: Get the current user's scan history
      parameters:
        - name: authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of previous scans
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanHistoryResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /history/summary:
    get:
      operationId: getHistorySummary
      tags: [history]
      summary: Get summary stats for the dashboard (total scans, trend, latest result)
      parameters:
        - name: authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /routine:
    get:
      operationId: getRoutine
      tags: [routine]
      summary: Get the user's saved skincare routine
      parameters:
        - name: authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The user's routine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutineResponse"
    post:
      operationId: saveRoutine
      tags: [routine]
      summary: Save or update the user's skincare routine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveRoutineBody"
      responses:
        "200":
          description: Routine saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutineResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error, message]

    SignupBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        skinType:
          type: string
          nullable: true
        heritage:
          type: string
          nullable: true
      required: [name, email, password]

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required: [token, user]

    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        skinType:
          type: string
          nullable: true
        heritage:
          type: string
          nullable: true
      required: [id, name, email]

    ScanResult:
      type: object
      properties:
        id:
          type: string
        acneLevel:
          type: string
          enum: [Mild, Moderate, Severe]
        confidence:
          type: number
          minimum: 0
          maximum: 100
        regions:
          type: array
          items:
            type: string
        recommendations:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
      required: [id, acneLevel, confidence, regions, recommendations, createdAt]

    ScanHistoryResponse:
      type: object
      properties:
        scans:
          type: array
          items:
            $ref: "#/components/schemas/ScanResult"
        total:
          type: integer
      required: [scans, total]

    DashboardSummary:
      type: object
      properties:
        totalScans:
          type: integer
        latestScan:
          $ref: "#/components/schemas/ScanResult"
          nullable: true
        trend:
          type: string
          enum: [improving, stable, worsening]
          nullable: true
        severityBreakdown:
          type: object
          properties:
            Mild:
              type: integer
            Moderate:
              type: integer
            Severe:
              type: integer
          required: [Mild, Moderate, Severe]
      required: [totalScans, severityBreakdown]

    RoutineStep:
      type: object
      properties:
        step:
          type: integer
        type:
          type: string
        name:
          type: string
        desc:
          type: string
      required: [step, type, name, desc]

    RoutineResponse:
      type: object
      properties:
        morning:
          type: array
          items:
            $ref: "#/components/schemas/RoutineStep"
        night:
          type: array
          items:
            $ref: "#/components/schemas/RoutineStep"
      required: [morning, night]

    SaveRoutineBody:
      type: object
      properties:
        morning:
          type: array
          items:
            $ref: "#/components/schemas/RoutineStep"
        night:
          type: array
          items:
            $ref: "#/components/schemas/RoutineStep"
      required: [morning, night]
